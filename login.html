<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Art | login</title>
    <link rel="icon" href="assets/growwpark_logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        blackMain: '#0B0B0B',
                        whiteMain: '#F5F5F5',
                        deepBurgundy: '#4A0E1A', 
                        antiqueGold: '#C6A75E',
                    }
                }
            }
        };
    </script>
    <style>
        :root {
            --color-background: #F5F5F5;
            --color-surface: #FFFFFF;
            --color-primary-text: #0B0B0B;
            --color-accent: #C6A75E; 
            --color-border: #E5E7EB;
        }
        .dark {
            --color-background: #0B0B0B;
            --color-surface: #141414;
            --color-primary-text: #F5F5F5;
            --color-border: #2A2A2A;
        }
        html, body { height: 100%; margin: 0; overflow-x: hidden; }
        body {
            background-color: var(--color-background);
            color: var(--color-primary-text);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 1000px;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        .control-bubble {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            color: var(--color-primary-text);
            transition: 0.2s;
        }
        .input-field {
            background-color: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-primary-text);
            padding: 0.75rem 1rem;
            width: 100%;
            border-radius: 0.5rem;
        }
        .input-field:focus { border-color: var(--color-accent); outline: none; }
        .btn-primary {
            background: linear-gradient(135deg, #4A0E1A 0%, #C6A75E 100%);
            color: white;
            padding: 0.85rem;
            width: 100%;
            border-radius: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem;
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            transition: 0.2s;
        }
        .social-btn:hover { background-color: rgba(198, 167, 94, 0.05); border-color: var(--color-accent); }
        
        /* RTL Logic */
        html[dir="rtl"] .md\:flex-row { flex-direction: row-reverse; }
        html[dir="rtl"] .text-left { text-align: right; }
        html[dir="rtl"] .text-right { text-align: left; }
        html[dir="rtl"] .pr-10 { padding-right: 0.75rem; padding-left: 2.5rem; }
        html[dir="rtl"] .absolute.right-3 { right: auto; left: 0.75rem; }
    </style>
</head>
<body>

    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleRTL()" class="control-bubble" title="Translate"><i class="fas fa-language"></i></button>
        <button onclick="toggleTheme()" class="control-bubble" title="Theme"><i class="fas fa-moon"></i></button>
    </div>

    <div class="auth-card flex flex-col md:flex-row">
        <div class="hidden md:flex md:w-5/12 relative bg-black min-h-[550px]">
            <img src="/assets/vel.jpeg" class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale">
            <div class="relative z-10 p-10 flex flex-col justify-between h-full w-full bg-gradient-to-t from-blackMain">
                <a href="index.html" class="flex items-center gap-3 group">
    
    <span class="h-12 w-12 rounded-full bg-deepBurgundy border border-antiqueGold flex items-center justify-center text-antiqueGold text-xl transition-transform group-hover:scale-110">
        <i class="fas fa-pen-nib"></i>
    </span>

<div class="flex flex-col items-start md:items-start items-center">        <span class="block text-2xl font-black tracking-tighter text-antiqueGold">Inkro</span>
        <span class="block text-[10px] font-bold text-antiqueGold uppercase tracking-widest">Body Art</span>
    </div>

</a>
                <div>
                    <h2 class="text-4xl font-black text-white leading-tight mb-4">Etch Your <br><span class="text-antiqueGold italic font-serif">Legacy</span></h2>
                    <p class="text-sm text-gray-400">Sign in to track your ink and book master sessions.</p>
                </div>
            </div>
        </div>
<div class="w-full md:w-7/12 p-8 lg:p-12 flex flex-col justify-center items-center text-center md:items-start md:text-left">    <a href="index.html" class="md:hidden flex items-center gap-3 mb-8 justify-center group">

        <span class="h-10 w-10 rounded-full bg-deepBurgundy border border-antiqueGold flex items-center justify-center text-antiqueGold transition-transform group-hover:scale-110">
            <i class="fas fa-pen-nib"></i>
        </span>

        <div class="text-left">
            <span class="block text-2xl font-black tracking-tighter text-antiqueGold">Inkro</span>
            <span class="block text-[8px] font-bold text-antiqueGold uppercase">Body Art</span>
        </div>

    </a>

<div class="mb-6 w-full flex flex-col items-center justify-center text-center">
    <h3 class="text-2xl font-black">Member  Login</h3>
    <p class="text-[10px] opacity-50 uppercase tracking-[0.2em] mt-1">
        Continue Your Ink Journey
    </p>
</div>
<form onsubmit="handleAuth(event)" class="w-full max-w-sm space-y-5">

    <!-- Email -->
    <div class="text-left w-full">
        <label class="block text-[10px] font-black uppercase tracking-widest opacity-50 mb-2">
            Email Address
        </label>
        <input 
            type="email"
            required
            class="input-field text-sm"
            placeholder="identity@growwpark.com"
        >
    </div>

    <!-- Password -->
    <div class="text-left w-full">
        <label class="block text-[10px] font-black uppercase tracking-widest opacity-50 mb-2">
            Password
        </label>

        <div class="relative">
            <input 
                type="password"
                required
                class="input-field text-sm pr-10"
                placeholder="••••••••"
            >

            <button 
                type="button"
                onclick="togglePass(this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 opacity-40 hover:text-antiqueGold transition"
            >
                <i class="fas fa-eye text-xs"></i>
            </button>
        </div>

        <!-- Options -->
        <div class="flex items-center justify-between mt-3">

            <label class="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" class="w-4 h-4 accent-antiqueGold">
                <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">
                    Remember Me
                </span>
            </label>

            <a href="#" class="text-[10px] font-bold text-antiqueGold hover:underline uppercase tracking-widest">
                Forgot Password
            </a>

        </div>

    </div>

    <!-- Login Button -->
    <button 
        type="submit"
        class="btn-primary shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all"
    >
        Login
    </button>

</form>
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200 dark:border-white/10"></div></div>
                <div class="relative flex justify-center text-[8px] uppercase font-black tracking-widest"><span class="bg-white dark:bg-[#141414] px-4 text-gray-400">Third-Party Entry</span></div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button class="social-btn"><i class="fab fa-google text-red-500"></i><span>Google</span></button>
                <button class="social-btn"><i class="fab fa-facebook text-blue-600"></i><span>Facebook</span></button>
                <button class="social-btn"><i class="fab fa-apple text-current"></i><span>Apple</span></button>
            </div>

            <p class="mt-8 text-center text-[10px] opacity-60 uppercase tracking-widest">New Collective Member? <a href="signup.html" class="text-antiqueGold font-black hover:underline">Register</a></p>
        </div>
    </div>

    <script>
        function toggleRTL() {
            const h = document.documentElement;
            const current = h.getAttribute('dir');
            h.setAttribute('dir', current === 'ltr' ? 'rtl' : 'ltr');
        }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function togglePass(btn) {
            const input = btn.parentElement.querySelector('input');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.innerHTML = input.type === 'password' ? '<i class="fas fa-eye text-xs"></i>' : '<i class="fas fa-eye-slash text-xs"></i>';
        }
        function handleAuth(e) {
            e.preventDefault();
            const b = e.target.querySelector('button[type="submit"]');
            b.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            setTimeout(() => window.location.href = 'index.html', 1000);
        }
    </script>
</body>
</html>
