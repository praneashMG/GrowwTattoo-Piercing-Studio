<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Art | Signup</title>
    <link rel="icon" href="assets/growwpark_logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        blackMain: '#0B0B0B',
                        whiteMain: '#F5F5F5',
                        deepBurgundy: '#4A0E1A', 
                        antiqueGold: '#C6A75E',
                    }
                }
            }
        };
    </script>
    <style>
        :root { --color-background: #F5F5F5; --color-surface: #FFFFFF; --color-primary-text: #0B0B0B; --color-accent: #C6A75E; --color-border: #E5E7EB; }
        .dark { --color-background: #0B0B0B; --color-surface: #141414; --color-primary-text: #F5F5F5; --color-border: #2A2A2A; }
        html, body { height: 100%; margin: 0; overflow-x: hidden; }
        body { background-color: var(--color-background); color: var(--color-primary-text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { background-color: var(--color-surface); border: 1px solid var(--color-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); width: 100%; max-width: 1000px; border-radius: 1.5rem; overflow: hidden; }
        .control-bubble { background-color: var(--color-surface); border: 1px solid var(--color-border); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--color-primary-text); }
        .input-field { background-color: transparent; border: 1px solid var(--color-border); color: var(--color-primary-text); padding: 0.75rem 1rem; width: 100%; border-radius: 0.5rem; }
        .input-field:focus { border-color: var(--color-accent); outline: none; }
        .btn-primary { background: linear-gradient(135deg, #4A0E1A 0%, #C6A75E 100%); color: white; padding: 0.85rem; width: 100%; border-radius: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.6rem; border: 1px solid var(--color-border); border-radius: 0.5rem; font-size: 0.7rem; font-weight: 700; transition: 0.2s; }
        .social-btn:hover { background-color: rgba(198, 167, 94, 0.05); border-color: var(--color-accent); }
        html[dir="rtl"] .md\:flex-row { flex-direction: row-reverse; }
        html[dir="rtl"] .text-left { text-align: right; }
    </style>
</head>
<body>

    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleRTL()" class="control-bubble"><i class="fas fa-language"></i></button>
        <button onclick="toggleTheme()" class="control-bubble"><i class="fas fa-moon"></i></button>
    </div>

    <div class="auth-card flex flex-col md:flex-row">
        <div class="hidden md:flex md:w-5/12 relative bg-black min-h-[550px]">
            <img src="/assets/vel.jpeg" class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale">
            <div class="relative z-10 p-10 flex flex-col justify-between h-full w-full bg-gradient-to-t from-blackMain">
                <div class="flex items-center gap-3">
                   <a href="index.html" class="flex items-center gap-3">
    
    <span class="h-12 w-12 rounded-full bg-deepBurgundy border border-antiqueGold flex items-center justify-center text-antiqueGold text-xl">
        <i class="fas fa-pen-nib"></i>
    </span>

    <div class="text-left">
        <span class="block text-2xl font-black tracking-tighter text-antiqueGold">Inkro</span>
        <span class="block text-[10px] font-bold text-antiqueGold uppercase tracking-widest">Body Art</span>
    </div>

</a>
                </div>
                <div>
                    <h2 class="text-4xl font-black text-white leading-tight mb-4">New <br><span class="text-antiqueGold italic font-serif">Identity</span></h2>
                    <p class="text-sm text-gray-400">Join the Growwpark collective and begin your transformation.</p>
                </div>
            </div>
        </div>

 <div class="w-full md:w-7/12 p-8 lg:p-12 flex flex-col justify-center">

    <a href="index.html" class="md:hidden flex items-center gap-3 mb-6 justify-center group">

        <span class="h-10 w-10 rounded-full bg-deepBurgundy border border-antiqueGold flex items-center justify-center text-antiqueGold transition-transform group-hover:scale-110">
            <i class="fas fa-pen-nib"></i>
        </span>

        <div class="text-left">
            <span class="block text-xl font-black tracking-tighter text-antiqueGold">Inkro</span>
            <span class="block text-[8px] font-bold text-antiqueGold uppercase">Body Art</span>
        </div>

    </a>

    <div class="mb-6 text-center">
    <h3 class="text-2xl font-black">Register</h3>
    <p class="text-[10px] opacity-50 uppercase tracking-widest mt-1">
        Identity Establishment
    </p>
</div>

           <form onsubmit="handleAuth(event)" class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1">First Name</label>
            <input type="text" required class="input-field text-sm" placeholder="Julian">
        </div>
        <div>
            <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1">Last Name</label>
            <input type="text" required class="input-field text-sm" placeholder="Thorne">
        </div>
    </div>
    
    <div>
        <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1">Email</label>
        <input type="email" required class="input-field text-sm" placeholder="name@example.com">
    </div>
    
    <div>
        <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1">Passcode</label>
        <input type="password" id="pass" required class="input-field text-sm" placeholder="••••••••">
        <div class="mt-2">
            <div class="w-full bg-gray-200 dark:bg-white/10 h-1 rounded-full overflow-hidden">
                <div id="bar" class="h-full bg-red-500 w-1/4 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <div class="flex items-center justify-between px-1">
        <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" class="w-3 h-3 rounded border-gray-300 accent-antiqueGold">
            <span class="text-[10px] uppercase font-black tracking-tighter opacity-70 group-hover:opacity-100 transition-opacity">Remember Session</span>
        </label>
        <a href="#" class="text-[9px] uppercase font-black tracking-widest text-antiqueGold hover:underline">Terms of Ink</a>
    </div>

    <button type="submit" class="btn-primary shadow-lg mt-2">Create Account</button>
</form>
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200 dark:border-white/10"></div></div>
                <div class="relative flex justify-center text-[8px] uppercase font-black tracking-widest"><span class="bg-white dark:bg-[#141414] px-4 text-gray-400">Social Sign Up</span></div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button class="social-btn"><i class="fab fa-google text-red-500"></i><span>Google</span></button>
                <button class="social-btn"><i class="fab fa-facebook text-blue-600"></i><span>Facebook</span></button>
                <button class="social-btn"><i class="fab fa-apple text-current"></i><span>Apple</span></button>
            </div>

            <p class="mt-8 text-center text-[10px] opacity-60 uppercase tracking-widest">Already Registered? <a href="login.html" class="text-antiqueGold font-black hover:underline">Login</a></p>
        </div>
    </div>

    <script>
        function toggleRTL() { const h = document.documentElement; h.setAttribute('dir', h.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        const pass = document.getElementById('pass');
        const bar = document.getElementById('bar');
        pass.addEventListener('input', () => {
            const v = pass.value; let s = Math.min(v.length/2, 4);
            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-antiqueGold'];
            bar.className = `h-full transition-all duration-300 ${colors[Math.floor(s)-1] || 'bg-red-500'}`;
            bar.style.width = (s * 25) + '%';
        });
        function handleAuth(e) { e.preventDefault(); e.target.querySelector('button').innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>'; setTimeout(() => window.location.href = 'login.html', 1000); }
    </script>
</body>
</html>
